{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#0f172a,#1e293b);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            font-family: 'Segoe UI', sans-serif;
        }

        .forbidden-card{
            background:#fff;
            padding:50px 40px;
            border-radius:24px;
            text-align:center;
            max-width:500px;
            width:100%;
            box-shadow:0 20px 50px rgba(0,0,0,0.25);
            animation:fadeIn 0.5s ease;
        }

        .icon-box{
            width:100px;
            height:100px;
            background:#fee2e2;
            color:#dc2626;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:0 auto 25px;
            font-size:45px;
        }

        h1{
            font-size:2rem;
            font-weight:700;
            color:#0f172a;
            margin-bottom:15px;
        }

        p{
            color:#64748b;
            margin-bottom:30px;
            font-size:16px;
        }

        .btn-home{
            padding:12px 24px;
            border-radius:12px;
            font-weight:600;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>

</head>
<body>

<div class="forbidden-card">

    <div class="icon-box">
        <i class="bi bi-shield-lock-fill"></i>
    </div>

    <h1>Access Denied</h1>

    <p>
        Sorry, you do not have permission to access this module.
    </p>

    <a href="{% url 'dashboard' %}" class="btn btn-primary btn-home">
        <i class="bi bi-arrow-left-circle me-2"></i>
        Back to Dashboard
    </a>

</div>

</body>
</html>
