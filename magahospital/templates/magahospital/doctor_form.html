{% extends 'magahospital/base.html' %}
{% load static %}

{% block content %}

<style>

    .form-container{
        max-width:900px;
        margin:auto;
    }

    /* TITLE */
    .form-title{
        font-size:2.3rem;
        font-weight:700;
        color:#0f172a;
        margin-bottom:25px;
    }

    /* FORM CARD */
    .custom-form-card{
        border:none;
        border-radius:22px;
        background:#fff;
        padding:35px;
        box-shadow:0 12px 35px rgba(0,0,0,0.08);
        transition:0.3s;
    }

    .custom-form-card:hover{
        transform:translateY(-3px);
        box-shadow:0 18px 40px rgba(0,0,0,0.1);
    }

    /* LABELS */
    label{
        font-weight:600;
        color:#334155;
        margin-bottom:8px;
    }

    /* INPUTS */
    .form-control,
    .form-select{
        border-radius:14px;
        border:1px solid #dbe1ea;
        padding:12px 15px;
        transition:0.3s;
        box-shadow:none;
    }

    .form-control:focus,
    .form-select:focus{
        border-color:#0d6efd;
        box-shadow:0 0 0 0.15rem rgba(13,110,253,0.15);
    }

    textarea.form-control{
        resize:none;
    }

    /* BUTTON GROUP */
    .button-group{
        display:flex;
        gap:12px;
        margin-top:25px;
        flex-wrap:wrap;
    }

    /* BUTTONS */
    .save-btn{
        border-radius:12px;
        padding:10px 24px;
        font-weight:600;
        transition:0.3s;
    }

    .save-btn:hover{
        transform:translateY(-2px);
    }

    .back-btn{
        border-radius:12px;
        padding:10px 22px;
        font-weight:600;
    }

    /* FORM PARAGRAPH SPACING */
    form p{
        margin-bottom:20px;
    }

    /* RESPONSIVE */
    @media(max-width:768px){

        .form-title{
            font-size:1.9rem;
        }

        .custom-form-card{
            padding:25px;
        }

    }

</style>

<div class="form-container">

    <!-- TITLE -->
    <h2 class="form-title">

        <i class="bi bi-heart-pulse-fill text-primary me-2"></i>

        Doctor Form

    </h2>

    <!-- FORM CARD -->
    <form method="POST" class="custom-form-card">

        {% csrf_token %}

        <div class="row">

    <div class="col-md-12 mb-4">

        <label>Patient History</label>

        {{ form.history }}

    </div>

</div>


<div class="row">

    <div class="col-md-12 mb-4">

        <label>Diagnosis</label>

        {{ form.diagnosis }}

    </div>

</div>

        <!-- BUTTONS -->
        <div class="button-group">

            <button type="submit"
                    class="btn btn-success save-btn">

                <i class="bi bi-check-circle me-1"></i>
                Save Record

            </button>

            <a href="{% url 'visit_detail' visit.id %}"
               class="btn btn-secondary back-btn">

                <i class="bi bi-arrow-left me-1"></i>
                Back

            </a>

        </div>

    </form>

</div>

{% endblock %}
