{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Staff Login | Magadulla Hospital</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins', sans-serif;
            background: linear-gradient(rgba(15,23,42,0.85), rgba(15,23,42,0.85)),
            url('https://images.unsplash.com/photo-1586773860418-d37222d8fce3?q=80&w=1400&auto=format&fit=crop');

            background-size:cover;
            background-position:center;
            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .login-card{
            width:100%;
            max-width:420px;
            background:#fff;
            border-radius:20px;
            padding:40px 35px;
            box-shadow:0 15px 40px rgba(0,0,0,0.2);
            animation:fadeIn 0.7s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .hospital-logo{
            width:90px;
            height:90px;
            background:#e0edff;
            color:#0d6efd;

            display:flex;
            justify-content:center;
            align-items:center;

            border-radius:50%;
            margin:0 auto 20px;
            font-size:40px;
        }

        .login-title{
            text-align:center;
            margin-bottom:5px;
            font-weight:700;
            color:#0f172a;
        }

        .login-subtitle{
            text-align:center;
            color:#6c757d;
            margin-bottom:30px;
            font-size:14px;
        }

        .form-label{
            font-weight:500;
            color:#334155;
        }

        .form-control{
            height:50px;
            border-radius:12px;
            border:1px solid #dbe1ea;
            padding-left:15px;
            transition:0.3s;
        }

        .form-control:focus{
            border-color:#0d6efd;
            box-shadow:0 0 0 0.15rem rgba(13,110,253,0.15);
        }

        .login-btn{
            height:50px;
            border-radius:12px;
            font-weight:600;
            font-size:16px;
            transition:0.3s;
        }

        .login-btn:hover{
            transform:translateY(-2px);
        }

        .back-home{
            text-align:center;
            margin-top:20px;
        }

        .back-home a{
            text-decoration:none;
            color:#0d6efd;
            font-size:14px;
            transition:0.3s;
        }

        .back-home a:hover{
            color:#084298;
        }

        .footer-text{
            text-align:center;
            margin-top:25px;
            color:#94a3b8;
            font-size:13px;
        }

    </style>

</head>

<body>

<div class="login-card">

    <!-- ICON -->
    <div class="hospital-logo">
        <i class="bi bi-hospital"></i>
    </div>

    <!-- TITLE -->
    <h2 class="login-title">Staff Login</h2>

    <p class="login-subtitle">
        Magadulla Hospital Management System
    </p>

    <!-- FORM -->
    <form method="post">

        {% csrf_token %}

        <div class="mb-3">

            <label for="id_username" class="form-label">
                Username
            </label>

            <input 
                type="text" 
                name="username" 
                class="form-control" 
                id="id_username"
                placeholder="Enter your username"
                required
            >

        </div>

        <div class="mb-4">

            <label for="id_password" class="form-label">
                Password
            </label>

            <input 
                type="password" 
                name="password" 
                class="form-control" 
                id="id_password"
                placeholder="Enter your password"
                required
            >

        </div>

        <button type="submit" class="btn btn-primary w-100 login-btn">

            <i class="bi bi-box-arrow-in-right me-2"></i>
            Login

        </button>

    </form>

    <!-- BACK -->
    <div class="back-home">
        <a href="{% url 'index' %}">
            <i class="bi bi-arrow-left"></i>
            Back to Home
        </a>
    </div>

    <!-- FOOTER -->
    <div class="footer-text">
        © 2026 Magadulla Hospital
    </div>

</div>

</body>
</html>
