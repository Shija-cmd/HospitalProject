{% extends 'magahospital/base.html' %}
{% load static %}

{% block content %}

<h2 class="mb-3">Patients</h2>

<a href="{% url 'create_patient' %}" class="btn btn-primary mb-3">
  + Add Patient
</a>

<!-- 🔍 SEARCH + FILTER -->
<form method="GET" class="row mb-3">

  <div class="col-md-4">
    <input type="text" name="q" class="form-control"
           placeholder="Search name or ID"
           value="{{ request.GET.q }}">
  </div>

  <div class="col-md-3">
    <select name="sex" class="form-select">
      <option value="">All</option>
      <option value="M" {% if request.GET.sex == "M" %}selected{% endif %}>Male</option>
      <option value="F" {% if request.GET.sex == "F" %}selected{% endif %}>Female</option>
    </select>
  </div>

  <div class="col-md-2">
    <button type="submit" class="btn btn-primary">Search</button>
  </div>

</form>

<!-- 📋 PATIENT TABLE -->
<table class="table table-bordered table-striped">
  <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody>
  {% for patient in patients %}
    <tr>
      <td>{{ patient.idno }}</td>
      <td>{{ patient.firstname }} {{ patient.secondname }}</td>
      <td>

        <!-- Create Visit -->
        <a href="{% url 'create_visit' patient.idno %}" class="btn btn-success btn-sm">
          Create Visit
        </a>

        <!-- View History -->
        <a href="{% url 'patient_history' patient.idno %}" class="btn btn-info btn-sm">
          History
        </a>

      </td>
    </tr>
  {% empty %}
    <tr>
      <td colspan="3" class="text-center">No patients found</td>
    </tr>
  {% endfor %}
  </tbody>
</table>

{% endblock %}
