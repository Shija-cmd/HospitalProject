{% extends 'magahospital/base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-lg border-0">

        <div class="card-body p-4">

            <h2 class="mb-4 text-primary">

                🏥 Add Procedure

            </h2>

            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                <div class="mb-3">

                    <label>
                        Procedure Name
                    </label>

                    {{ form.procedure_name }}

                </div>

                <div class="mb-3">

                    <label>
                        Notes
                    </label>

                    {{ form.notes }}

                </div>

                <div class="mb-3">

                    <label>
                        Cost
                    </label>

                    {{ form.cost }}

                </div>

                <button type="submit"
                        class="btn btn-primary">

                    Save Procedure

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
